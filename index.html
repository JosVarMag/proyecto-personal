<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vende+ - Inicio</title>
    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <input type="checkbox" id="menu-toggle" class="menu-toggle">

    <div class="app">

        <label for="menu-toggle" class="overlay"></label>

        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://i.pravatar.cc/100?img=13" alt="Avatar de Renato López">
                <div>
                    <h2>Renato López</h2>
                    <p>Ver perfil</p>
                </div>
            </div>
            <nav>
                <a href="index.html"><img src = "iconos/casita.png" class="nav-icon" alt = "Inicio"><span>Inicio</span></a>
                <a href="perfil.html"><img src = "iconos/perfil.png" class="nav-icon" alt = "Perfil"><span>Perfil</span></a>
                <a href="#"><img src = "iconos/categorias.png" class="nav-icon" alt = "Categorías"><span>Categorías</span></a>
                <a href="#"><img src = "iconos/buscar.png" class="nav-icon" alt = "Buscar"><span>Buscar</span></a>
                <a href="#"><img src = "iconos/carrito.png" class="nav-icon" alt = "Carrito"><span>Carrito</span></a>
                <a href="#"><img src = "iconos/cerrar_sesion.png" class="nav-icon" alt = "Cerrar sesión"><span>Cerrar sesión</span></a>
            </nav>
        </aside>

        <header class="topbar">
            <label for="menu-toggle" class="icon-btn" aria-label="Abrir menú">
                <img src="iconos/menu.png" alt="Menú" class="menu-icon-img">
            </label>
            <h1 class="logo">Vende+</h1>
            <button class="icon-btn" aria-label="Notificaciones"><img src = "iconos/campanita.png" class="notification-icon" alt = "Notificaciones"></button>
        </header>

        <main>
            <section class="hero-banner">
                <div class="coin"><img src = "iconos/logo.png" class="logo-img" alt = "Logo Vende+"></div>
            </section>

            <section>
                <h2>Productos en venta</h2>
                <div class="grid">
                    <article class="card">
                        <img src="imagenes/mochila.jpeg" alt="Mochila">
                        <h3>Mochila recién usada</h3>
                        <p>S/120</p>
                        <button>Comprar</button>
                    </article>
                    <article class="card">
                        <img src="imagenes/auto.jpeg" alt="Auto">
                        <h3>Auto última generación</h3>
                        <p>S/30000</p>
                        <button>Comprar</button>
                    </article>
                    <article class="card">
                        <img src="imagenes/libros.jpeg" alt="Libros">
                        <h3>Libros de colección de Ciro Alegría</h3>
                        <p>S/500</p>
                        <button>Comprar</button>
                    </article>
                    <article class="card">
                        <img src="imagenes/kit_de_cocina.jpeg" alt="Kit de cocina">
                        <h3>Kit completo de cocina</h3>
                        <p>S/75</p>
                        <button>Comprar</button>
                    </article>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="index.html"><img src = "iconos/casita.png" class="nav-icon"><span>Inicio</span></a>
            <a href="#"><img src = "iconos/categorias.png" class="nav-icon"><span>Categoría</span></a>
            <a href="#"><img src = "iconos/buscar.png" class="nav-icon"><span>Buscar</span></a>
            <a href="#"><img src = "iconos/carrito.png" class="nav-icon"><span>Carrito</span></a>
            <a href="perfil.html" class="active"><img src = "iconos/perfil.png" class="nav-icon"><span>Perfil</span></a>
        </nav>

    </div>
</body>
</html>
